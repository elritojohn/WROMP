<br>

<h2>Marketplace Match Engine</h2>

<p><b>Select a product to find potential suppliers and users.</b></p>

Match Type:<br>

<select id="match_type">

<option value="provider">Find Providers</option>

<option value="consumer">Find Consumers</option>

<option value="both">Show Both</option>

</select>

<br><br>

Select Product:

<select

id="product">

<option>

Biochar

</option>

<option>

Sawlogs

</option>

<option>

Chips

</option>

<option>

Lumber

</option>

</select>

<button

onclick=

"runMatch()"

>

Find Matching Businesses

</button>

<br><br>

<div

id="results">

</div>

<script>

async function runMatch(){

let product=

document.getElementById(

"product"

).value

.toLowerCase();

let matchType =
    document.getElementById(
        "match_type"
    ).value;

const response=

await fetch(

"data/businesses_store.csv"

);

const text=

await response.text();

const lines=

text.split(

"\n"

);

let output=

"<h2>" +

product +

"</h2>";

lines.forEach(

line=>{

let normalized=

line

.toLowerCase()

.replaceAll(

" ",

""

);

if(

normalized.includes(

product

.replaceAll(

" ",

""

)

)

){

output +=

"<p>" +

line +

"</p>";

}

}

);

document.getElementById(

"results"

).innerHTML=

output;

}

</script>

</body>
</html>
