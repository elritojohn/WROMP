<!DOCTYPE html>
<html>

<head>
<title>Business Registration</title>
</head>

<body>

<h1>Business Registration</h1>

<form>

Business Name:

<input
id="business_name"
type="text">

<br><br>

ZIP:

<input
id="zip"
type="text">

<br><br>

Role:

<select
id="role_dropdown">

<option>
Loading Roles...
</option>

</select>

<br><br>

Category:

<input
id="category"
type="text">

<br><br>

Email:

<input
id="email"
type="text">

<br><br>

Products Provided:

<select
id="provide_dropdown">

<option>
Loading Products...
</option>

</select>

<br><br>

Products Desired:

<select
id="need_dropdown">

<option>
Loading Products...
</option>

</select>

<br><br>

Maximum Haul:

<input
id="haul"
type="text">

<br><br>

<button
type="button"
onclick="submitBusiness()">

Register Business

</button>
<br><br>

<a href="index.html">
<button type="button">Return to Home</button>
</a>
</form>

<script>

async function loadDropdown(
    csvFile,
    dropdownID
){

    const response =
        await fetch(
            "lookups/" + csvFile
        );

    const text =
        await response.text();

    const lines =
        text.split("\n");

    const dropdown =
        document.getElementById(
            dropdownID
        );

    dropdown.innerHTML = "";

    lines.forEach(
        line => {

        line =
            line.trim();

        if(line != ""){

            let option =
                document.createElement(
                    "option"
                );

            option.text =
                line;

            dropdown.add(
                option
            );

        }

    });

}

loadDropdown(
    "roles.csv",
    "role_dropdown"
);

loadDropdown(
    "products.csv",
    "provide_dropdown"
);

loadDropdown(
    "products.csv",
    "need_dropdown"
);

async function submitBusiness(){

    let business =
        document.getElementById(
            "business_name"
        ).value;

    let zip =
        document.getElementById(
            "zip"
        ).value;

    let role =
        document.getElementById(
            "role_dropdown"
        ).value;

    let category =
        document.getElementById(
            "category"
        ).value;

    let email =
        document.getElementById(
            "email"
        ).value;

    let provide =
        document.getElementById(
            "provide_dropdown"
        ).value;

    let need =
        document.getElementById(
            "need_dropdown"
        ).value;
    let haul =
        document.getElementById(
            "haul"
        ).value;

    await fetch(
        "/save_business",
        {
            method: "POST",
            headers: {
                "Content-Type":
                "application/x-www-form-urlencoded"
            },
            body:
                "business=" +
                encodeURIComponent(
                    business
                ) +
                "&zip=" +
                encodeURIComponent(
                    zip
                ) +
                "&role=" +
                encodeURIComponent(
                    role
                ) +
                "&provide=" +
                encodeURIComponent(
                    provide
                ) +
                "&need=" +
                encodeURIComponent(
                    need
                )
        }
    );

    alert(

        "Registered\n\n" +
   

        business + "\n" +
        zip + "\n" +
        role + "\n" +
        category + "\n" +
        provide + "\n" +
        need

    );


}

</script>

</body>

</html>
